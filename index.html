/* ============================================================
   スコア算出・判定ロジック（自動算出）
   ============================================================ */
function computeScore(r) {
  return ACOLS.reduce((sum, c) => sum + (SYM_VALUE[r[c.key]] || 0), 0);
}
function strongCount(r) {
  return ACOLS.reduce((n, c) => n + (r[c.key] === '◎' || r[c.key] === '○' ? 1 : 0), 0);
}
function judge(r) {
  const score = computeScore(r);
  const strong = strongCount(r);
  const inh = r.inherent_risk;
  // ギャップ判定（固有リスクに対しカバレッジ不足）
  if (inh === '高' && score < 11) return '要強化';
  if (inh === '中' && score < 7) return '要強化';
  if (inh === '低' && score < 4) return '要強化';
  // 重複疑い（固有リスクに比して過剰なアシュアランス）
  if ((inh === '中' || inh === '低') && strong >= 5 && score >= 14) return '重複疑い';
  if (inh === '高' && strong >= 6 && score >= 17) return '重複疑い';
  return '適正';
}
const RISKS = RAW_RISKS.map((r) => ({ ...r, score: computeScore(r), assessment: judge(r) }));

const CATEGORIES = [...new Set(RISKS.map((r) => r.category))];

const LEVEL_PT = { '高': 2, '中': 1, '低': 0 };
function relianceJudge(p) {
  const pts = LEVEL_PT[p.objectivity] + LEVEL_PT[p.competency] + LEVEL_PT[p.process];
  if (LEVEL_PT[p.objectivity] === 0) return pts >= 3 ? '限定的依拠' : '依拠不可';
  if (pts >= 5) return '依拠可';
  if (pts >= 3) return '限定的依拠';
  return '依拠不可';
}

/* ----- ドーナツチャート（自前SVG） ----- */
function Donut({ data, onSegClick, active }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const R = 70, r = 44, cx = 90, cy = 90;
  let acc = 0;
  const segs = data.map((d) => {
    const start = acc / total, end = (acc + d.value) / total;
    acc += d.value;
    const a0 = start * 2 * Math.PI - Math.PI / 2;
    const a1 = end * 2 * Math.PI - Math.PI / 2;
    const large = end - start > 0.5 ? 1 : 0;
    const x0 = cx + R * Math.cos(a0), y0 = cy + R * Math.sin(a0);
    const x1 = cx + R * Math.cos(a1), y1 = cy + R * Math.sin(a1);
    const xi0 = cx + r * Math.cos(a0), yi0 = cy + r * Math.sin(a0);
    const xi1 = cx + r * Math.cos(a1), yi1 = cy + r * Math.sin(a1);
    const path = `M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} L ${xi1} ${yi1} A ${r} ${r} 0 ${large} 0 ${xi0} ${yi0} Z`;
    return { ...d, path };
  });
  const [hover, setHover] = useState(null);
  return (
    <div className="flex items-center gap-4">
      <svg width="180" height="180" viewBox="0 0 180 180" role="img" aria-label="ステータス別リスク分布">
        {segs.map((s) => (
          <path key={s.label} d={s.path} fill={s.color}
            opacity={active && active !== s.label ? 0.3 : (hover && hover !== s.label ? 0.6 : 1)}
            stroke="#fff" strokeWidth="2" style={{ cursor: 'pointer', transition: 'opacity .15s' }}
            onClick={() => onSegClick(s.label)}
            onMouseEnter={() => setHover(s.label)} onMouseLeave={() => setHover(null)} />
        ))}
        <text x="90" y="84" textAnchor="middle" className="fill-ink" fontSize="26" fontWeight="700">{total}</text>
        <text x="90" y="104" textAnchor="middle" fill="#888" fontSize="11">リスク総数</text>
      </svg>
      <div className="space-y-1.5 text-sm">
        {segs.map((s) => (
          <button key={s.label} onClick={() => onSegClick(s.label)}
            className="flex items-center gap-2 w-full text-left hover:opacity-70">
            <span className="w-3 h-3 rounded-sm" style={{ background: s.color }}></span>
            <span className="flex-1">{s.label}</span>
            <span className="font-bold tabular-nums">{s.value}</span>
          </button>
        ))}
        {active && (
          <button onClick={() => onSegClick(null)} className="text-xs text-tred underline mt-1">フィルタ解除</button>
        )}
      </div>
    </div>
  );
}

/* ----- ヒストグラム（自前SVG） ----- */
function Histogram({ bins }) {
  const max = Math.max(...bins.map((b) => b.count), 1);
  const W = 340, H = 180, pad = 30, bw = (W - pad * 2) / bins.length;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} role="img" aria-label="カバレッジスコア分布">
      {[0, 0.5, 1].map((t) => (
        <line key={t} x1={pad} x2={W - pad} y1={pad + (H - pad * 2) * (1 - t)} y2={pad + (H - pad * 2) * (1 - t)}
          stroke="#eee" />
      ))}
      {bins.map((b, i) => {
        const h = (b.count / max) * (H - pad * 2);
        const x = pad + i * bw + 6;
        return (
          <g key={b.label}>
            <rect x={x} y={H - pad - h} width={bw - 12} height={h} rx="3" fill="#C8102E" opacity="0.85" />
            {b.count > 0 && <text x={x + (bw - 12) / 2} y={H - pad - h - 5} textAnchor="middle" fontSize="11" fontWeight="700" fill="#1F1F1F">{b.count}</text>}
            <text x={x + (bw - 12) / 2} y={H - pad + 14} textAnchor="middle" fontSize="10" fill="#666">{b.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ============================================================
   タブ：統計・分析
   ============================================================ */
function StatsTab() {
  const inherent = useMemo(() => {
    const c = { 高: 0, 中: 0, 低: 0 };
    RISKS.forEach((r) => c[r.inherent_risk]++);
    return c;
  }, []);
  const bins = useMemo(() => {
    const defs = [[0, 3], [4, 6], [7, 9], [10, 12], [13, 21]];
    return defs.map(([lo, hi]) => ({
      label: hi === 21 ? `${lo}+` : `${lo}-${hi}`,
      count: RISKS.filter((r) => r.score >= lo && r.score <= hi).length,
    }));
  }, []);
  const cross = useMemo(() => {
    const map = {};
    CATEGORIES.forEach((cat) => {
      map[cat] = { 要強化: 0, 重複疑い: 0, 適正: 0, total: 0 };
    });
    RISKS.forEach((r) => { map[r.category][r.assessment]++; map[r.category].total++; });
    return map;
  }, []);

  return (
    <div className="grid lg:grid-cols-2 gap-4">
      <div className="bg-white rounded-lg border border-line p-4">
        <h3 className="font-bold text-gray-600 text-sm mb-3">固有リスク分布</h3>
        <div className="flex gap-3">
          {['高', '中', '低'].map((lvl) => (
            <div key={lvl} className="flex-1 rounded-lg p-3 text-center" style={{ background: INHERENT_STYLE[lvl].bg + '22' }}>
              <div className="text-3xl font-bold" style={{ color: INHERENT_STYLE[lvl].bg }}>{inherent[lvl]}</div>
              <div className="text-xs text-gray-600 mt-1">固有リスク {lvl}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-lg border border-line p-4">
        <h3 className="font-bold text-gray-600 text-sm mb-3">カバレッジスコア分布</h3>
        <Histogram bins={bins} />
      </div>

      <div className="bg-white rounded-lg border border-line p-4 lg:col-span-2">
        <h3 className="font-bold text-gray-600 text-sm mb-3">カテゴリ別 × 判定 クロス集計</h3>
        <div className="overflow-x-auto">
          <table className="min-w-[520px] w-full text-sm">

              <tr className="text-xs text-gray-500 border-b border-line">
                <th className="p-2 text-left">カテゴリ</th>
                <th className="p-2 text-center">要強化</th>
                <th className="p-2 text-center">重複疑い</th>
                <th className="p-2 text-center">適正</th>
                <th className="p-2 text-center">計</th>
              </tr>
            </thead>
            <tbody>
              {CATEGORIES.map((cat) => (
                <tr key={cat} className="border-b border-line">
                  <td className="p-2 font-medium">{cat}</td>
                  <td className="p-2 text-center" style={{ color: cross[cat]['要強化'] ? '#C8102E' : '#ccc', fontWeight: cross[cat]['要強化'] ? 700 : 400 }}>{cross[cat]['要強化']}</td>
                  <td className="p-2 text-center" style={{ color: cross[cat]['重複疑い'] ? '#B59B00' : '#ccc', fontWeight: cross[cat]['重複疑い'] ? 700 : 400 }}>{cross[cat]['重複疑い']}</td>
                  <td className="p-2 text-center" style={{ color: cross[cat]['適正'] ? '#2E7D32' : '#ccc', fontWeight: cross[cat]['適正'] ? 700 : 400 }}>{cross[cat]['適正']}</td>

/* ============================================================
   エクスポート機能
   ============================================================ */
function exportCSV(rows) {
  const header = ['No', 'カテゴリ', 'リスク項目', 'オーナー', '固有リスク', ...ACOLS.map((c) => c.label), 'スコア', '判定', '残余リスク', '対応方針'];
  const lines = rows.map((r) => [
    r.no, r.category, r.risk, r.owner, r.inherent_risk,
    ...ACOLS.map((c) => r[c.key]), r.score, r.assessment, r.residual_risk, r.policy,
  ]);
  const esc = (v) => `"${String(v).replace(/"/g, '""')}"`;
  const csv = '﻿' + [header, ...lines].map((row) => row.map(esc).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `assurance_map_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
